<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAKSI ANGKA - Game Matematika SD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7C3AED; /* Ungu */
            --secondary: #FBBF24; /* Kuning */
            --dark: #0F172A;
            --white: #FFFFFF;
            --danger: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: var(--white);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Background Animasi Bintang */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: moveStar linear infinite;
        }

        @keyframes moveStar {
            from { transform: translateY(-10px); }
            to { transform: translateY(100vh); }
        }

        /* Header */
        header {
            background: rgba(124, 58, 237, 0.2);
            backdrop-filter: blur(5px);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary);
            z-index: 10;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: var(--white);
            color: black;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            border: 2px solid black;
            box-shadow: 2px 2px 0px black;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--secondary);
            text-shadow: 2px 2px 0px #000;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .lives { color: #fb7185; }

        /* Game Container */
        #game-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Screens */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin-bottom: 10px; color: var(--secondary); }
        p { margin-bottom: 20px; font-size: 1.1rem; }

        /* Neubrutalism Button */
        .btn-main {
            background: var(--secondary);
            color: black;
            border: 4px solid black;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 6px 6px 0px black;
            transition: all 0.1s;
            margin-top: 10px;
        }

        .btn-main:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px black;
        }

        /* Controls / Answer Buttons */
        #controls {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: rgba(0,0,0,0.3);
            border-top: 2px solid var(--primary);
        }

        .ans-btn {
            background: var(--primary);
            color: white;
            border: 4px solid black;
            padding: 15px 5px;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px black;
            transition: 0.1s;
        }

        .ans-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px black;
        }

        .ans-btn.correct { background: #22c55e; }
        .ans-btn.wrong { background: #ef4444; }

        /* Level Indicator */
        .level-tag {
            background: var(--secondary);
            color: black;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 10px;
        }

        @media (max-width: 400px) {
            h1 { font-size: 1.8rem; }
            .ans-btn { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="starfield"></div>

    <header>
        <div class="logo-section">
            <a href="https://apel-pembelajaran.vercel.app" class="btn-back">⬅ KEMBALI</a>
            <span style="font-size: 1.5rem;">🍎</span>
            <div class="game-title">GALAKSI ANGKA</div>
        </div>
        <div class="stats">
            <div>Score: <span id="score-val">0</span></div>
            <div class="lives" id="lives-val">⭐⭐⭐</div>
        </div>
    </header>

    <div id="game-wrapper">
        <!-- Canvas Game -->
        <canvas id="gameCanvas"></canvas>

        <!-- Splash Screen -->
        <div id="screen-start" class="overlay">
            <h1>GALAKSI ANGKA</h1>
            <p>Hancurkan meteor dengan menjawab soal matematika!</p>
            <div style="font-size: 0.9rem; margin-bottom: 20px; color: var(--secondary);">
                Level 1: (+) | Level 2: (-) | Level 3: (×)
            </div>
            <button class="btn-main" onclick="startGame()">MULAI MAIN</button>
        </div>

        <!-- Level Up Screen -->
        <div id="screen-win" class="overlay hidden">
            <h1 id="win-title">LEVEL UP!</h1>
            <p id="win-msg">Hebat! Kamu naik ke level berikutnya.</p>
            <button class="btn-main" onclick="nextLevel()">LANJUT</button>
        </div>

        <!-- Game Over Screen -->
        <div id="screen-over" class="overlay hidden">
            <h1>GAME OVER</h1>
            <p>Skor Akhir: <span id="final-score">0</span></p>
            <button class="btn-main" onclick="resetGame()">MAIN LAGI</button>
        </div>
    </div>

    <!-- Tombol Jawaban -->
    <div id="controls">
        <button class="ans-btn" onclick="checkAnswer(0)">?</button>
        <button class="ans-btn" onclick="checkAnswer(1)">?</button>
        <button class="ans-btn" onclick="checkAnswer(2)">?</button>
    </div>

    <script>
        /** @type {HTMLCanvasElement} */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const btnAnswers = document.querySelectorAll('.ans-btn');
        const scoreEl = document.getElementById('score-val');
        const livesEl = document.getElementById('lives-val');

        // Game State
        let gameState = 'START'; // START, PLAYING, LEVEL_UP, GAMEOVER
        let score = 0;
        let lives = 3;
        let level = 1;
        let meteors = [];
        let lasers = [];
        let options = [];
        let correctAnswer = null;
        let currentProblem = "";
        let spawnTimer = 0;
        let gameWidth, gameHeight;
        let playerX = 0;
        let targetPlayerX = 0;
        let speedMultiplier = 1;

        // Sound Engine (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Initialize Stars
        function initStars() {
            const container = document.getElementById('starfield');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        // Resize Canvas
        function resize() {
            gameWidth = canvas.clientWidth;
            gameHeight = canvas.clientHeight;
            canvas.width = gameWidth;
            canvas.height = gameHeight;
            playerX = gameWidth / 2;
            targetPlayerX = playerX;
        }

        window.addEventListener('resize', resize);
        resize();
        initStars();

        // Control Logic
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            targetPlayerX = e.clientX - rect.left;
        });

        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            targetPlayerX = e.touches[0].clientX - rect.left;
        });

        // Game Logic
        function generateProblem() {
            let a, b, ans, op;
            if (level === 1) { // Penjumlahan
                a = Math.floor(Math.random() * 10) + 1;
                b = Math.floor(Math.random() * 10) + 1;
                ans = a + b;
                op = "+";
            } else if (level === 2) { // Pengurangan
                a = Math.floor(Math.random() * 15) + 5;
                b = Math.floor(Math.random() * a) + 1;
                ans = a - b;
                op = "-";
            } else { // Perkalian
                a = Math.floor(Math.random() * 8) + 2;
                b = Math.floor(Math.random() * 5) + 1;
                ans = a * b;
                op = "×";
            }

            currentProblem = `${a} ${op} ${b}`;
            correctAnswer = ans;

            // Generate unique options
            let opts = [ans];
            while (opts.length < 3) {
                let wrong = ans + (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
                if (wrong >= 0 && !opts.includes(wrong)) opts.push(wrong);
            }
            options = opts.sort(() => Math.random() - 0.5);

            // Update Buttons
            btnAnswers.forEach((btn, i) => {
                btn.innerText = options[i];
                btn.className = 'ans-btn';
            });
        }

        function createMeteor() {
            // Hanya spawn jika tidak ada meteor di layar (agar fokus satu soal)
            if (meteors.length === 0) {
                generateProblem();
                meteors.push({
                    x: Math.random() * (gameWidth - 100) + 50,
                    y: -50,
                    speed: (1.5 + (level * 0.5)) * speedMultiplier,
                    text: currentProblem,
                    size: 60
                });
            }
        }

        function startGame() {
            document.getElementById('screen-start').classList.add('hidden');
            gameState = 'PLAYING';
            score = 0;
            lives = 3;
            level = 1;
            speedMultiplier = 1;
            meteors = [];
            updateUI();
        }

        function updateUI() {
            scoreEl.innerText = score;
            livesEl.innerText = "⭐".repeat(lives);
        }

        function checkAnswer(index) {
            if (gameState !== 'PLAYING') return;

            if (options[index] === correctAnswer) {
                // Correct
                score += 10;
                playSound(600, 'triangle', 0.1);
                playSound(800, 'triangle', 0.1);
                
                // Shoot Laser
                lasers.push({
                    x: playerX,
                    y: gameHeight - 60,
                    targetX: meteors[0].x,
                    targetY: meteors[0].y
                });

                // Explode meteor after short delay
                setTimeout(() => {
                    meteors = [];
                    if (score > 0 && score % 50 === 0) {
                        showLevelUp();
                    }
                }, 100);
            } else {
                // Wrong
                lives--;
                playSound(150, 'sawtooth', 0.3);
                btnAnswers[index].classList.add('wrong');
                if (lives <= 0) gameOver();
            }
            updateUI();
        }

        function showLevelUp() {
            gameState = 'LEVEL_UP';
            level++;
            speedMultiplier += 0.2;
            document.getElementById('screen-win').classList.remove('hidden');
            document.getElementById('win-title').innerText = `LEVEL ${level}`;
            document.getElementById('win-msg').innerText = `Hebat! Sekarang gunakan operasi ${level==2? 'Pengurangan' : 'Perkalian'}.`;
        }

        function nextLevel() {
            document.getElementById('screen-win').classList.add('hidden');
            meteors = [];
            gameState = 'PLAYING';
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            document.getElementById('final-score').innerText = score;
            document.getElementById('screen-over').classList.remove('hidden');
        }

        function resetGame() {
            document.getElementById('screen-over').classList.add('hidden');
            startGame();
        }

        // Draw Functions
        function drawPlayer() {
            // Lerp movement
            playerX += (targetPlayerX - playerX) * 0.15;
            
            ctx.save();
            ctx.translate(playerX, gameHeight - 50);
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("🚀", 0, 0);
            
            // Thruster effect
            ctx.fillStyle = Math.random() > 0.5 ? varSecondary : "#F87171";
            ctx.beginPath();
            ctx.moveTo(-5, 5);
            ctx.lineTo(5, 5);
            ctx.lineTo(0, 15 + Math.random() * 5);
            ctx.fill();
            ctx.restore();
        }

        const varPrimary = "#7C3AED";
        const varSecondary = "#FBBF24";

        function drawMeteor(m) {
            ctx.save();
            // Shadow
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            
            // Rock Body
            ctx.fillStyle = "#4B5563";
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.size/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#1F2937";
            ctx.lineWidth = 3;
            ctx.stroke();

            // Text Soal
            ctx.fillStyle = "white";
            ctx.font = "bold 20px Orbitron";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.shadowBlur = 0;
            ctx.fillText(m.text, m.x, m.y);
            ctx.restore();
        }

        function drawLasers() {
            ctx.strokeStyle = varSecondary;
            ctx.lineWidth = 4;
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.targetX, l.targetY);
                ctx.stroke();
                lasers.splice(i, 1); // Laser disappears instantly
            }
        }

        // Main Loop
        function loop() {
            ctx.clearRect(0, 0, gameWidth, gameHeight);

            if (gameState === 'PLAYING') {
                createMeteor();

                // Update & Draw Meteors
                meteors.forEach((m, index) => {
                    m.y += m.speed;
                    drawMeteor(m);

                    // Reach bottom
                    if (m.y > gameHeight + 50) {
                        meteors.splice(index, 1);
                        lives--;
                        playSound(100, 'square', 0.2);
                        updateUI();
                        if (lives <= 0) gameOver();
                    }
                });

                drawLasers();
                drawPlayer();
            }

            requestAnimationFrame(loop);
        }

        // Start
        loop();

    </script>
</body>
</html>
