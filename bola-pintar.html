<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BOLA PINTAR - Basket Matematika Arcade</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange: #ef6c00;
      --orange-2: #ff9f39;
      --blue: #1565c0;
      --ink: #09121c;
      --white: #ffffff;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #ffd54f;
      --border: 3px solid #09121c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at top, #4fc3f7 0%, #1565c0 42%, #08192f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .app {
      width: 100%;
      max-width: 500px;
      height: min(94dvh, 920px);
      border-radius: 28px;
      border: var(--border);
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.32);
      background: rgba(255,255,255,0.06);
      display: grid;
      grid-template-rows: auto 1fr;
      position: relative;
    }

    header {
      z-index: 20;
      padding: max(10px, env(safe-area-inset-top)) 10px 10px;
      background: linear-gradient(180deg, var(--orange-2) 0%, var(--orange) 100%);
      border-bottom: var(--border);
      display: grid;
      grid-template-columns: 84px 1fr 84px;
      align-items: center;
      gap: 8px;
    }

    .top-card {
      background: rgba(255,255,255,0.95);
      border: 2px solid #09121c;
      border-radius: 16px;
      min-height: 54px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 0 #09121c;
      padding: 6px;
    }

    .top-card .label {
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1;
      opacity: 0.65;
    }

    .top-card .value {
      margin-top: 5px;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1;
    }

    .title-wrap {
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }

    .title-wrap h1 {
      font-family: 'Anton', sans-serif;
      font-size: 1.55rem;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .title-wrap p {
      margin-top: 4px;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .game-wrap {
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(255,255,255,0) 30%),
        linear-gradient(to bottom, #e5f7ff 0%, #bfe7ff 40%, #e4b36e 40%, #cb8635 100%);
    }

    .ui-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8;
    }

    .question-box {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(88%, 340px);
      background: rgba(255,255,255,0.96);
      border: var(--border);
      border-radius: 18px;
      padding: 10px 14px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.14);
      text-align: center;
    }

    .question-box .small {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      opacity: 0.6;
    }

    .question-box .big {
      margin-top: 4px;
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.45rem, 5vw, 2.25rem);
      line-height: 1;
      color: #09121c;
    }

    .hud-top {
      position: absolute;
      top: 104px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92%, 420px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .hud-chip {
      background: rgba(9,18,28,0.82);
      color: white;
      border-radius: 14px;
      padding: 8px 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.16);
      backdrop-filter: blur(6px);
    }

    .hud-chip .chip-label {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }

    .hud-chip .chip-value {
      margin-top: 3px;
      font-size: 1rem;
      font-weight: 800;
    }

    .meter {
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      margin-top: 7px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #fde047, #fb923c);
      transition: width 160ms linear;
    }

    .reveal {
      position: absolute;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      min-width: 210px;
      max-width: calc(100% - 24px);
      padding: 12px 16px;
      border-radius: 18px;
      background: rgba(9,18,28,0.88);
      color: white;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 140ms ease;
    }

    .reveal.show {
      opacity: 1;
    }

    .reveal .reveal-top {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }

    .reveal .reveal-answer {
      margin-top: 3px;
      font-size: 1.45rem;
      font-weight: 800;
      line-height: 1;
    }

    .reveal .reveal-status {
      margin-top: 6px;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
      background: linear-gradient(180deg, rgba(9,18,28,0.7), rgba(9,18,28,0.84));
      backdrop-filter: blur(6px);
    }

    .hidden {
      display: none !important;
    }

    .panel {
      width: min(100%, 390px);
      background: rgba(255,255,255,0.96);
      border: var(--border);
      border-radius: 28px;
      padding: 22px 20px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0,0,0,0.24);
    }

    .panel h2 {
      font-family: 'Anton', sans-serif;
      color: var(--orange);
      font-size: clamp(2.2rem, 8vw, 3.5rem);
      line-height: 0.95;
      margin-bottom: 10px;
    }

    .panel p {
      color: rgba(9,18,28,0.8);
      line-height: 1.45;
      font-size: 0.98rem;
    }

    .mode-grid {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .mode-btn, .main-btn, .sub-btn {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: var(--border);
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
      background: white;
    }

    .mode-btn.active {
      background: linear-gradient(180deg, #ffe082, #ffca28);
    }

    .main-btn {
      margin-top: 18px;
      background: linear-gradient(180deg, #ffb74d, #fb8c00);
    }

    .sub-btn {
      margin-top: 10px;
    }

    .score-final {
      font-family: 'Anton', sans-serif;
      font-size: clamp(3rem, 12vw, 4.4rem);
      color: #1565c0;
      line-height: 1;
      margin: 14px 0 8px;
    }

    .badges {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .badge {
      padding: 8px 12px;
      border: 2px solid #09121c;
      border-radius: 999px;
      background: #fff5d6;
      font-size: 0.82rem;
      font-weight: 800;
    }

    @media (max-width: 420px) {
      header {
        grid-template-columns: 74px 1fr 74px;
      }

      .title-wrap h1 {
        font-size: 1.32rem;
      }

      .title-wrap p {
        font-size: 0.72rem;
      }

      .hud-top {
        width: min(94%, 420px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="top-card">
        <div class="label">SKOR</div>
        <div class="value" id="scoreVal">0</div>
      </div>

      <div class="title-wrap">
        <h1>BOLA PINTAR</h1>
        <p>Basket Matematika Arcade</p>
      </div>

      <div class="top-card">
        <div class="label">NYAWA</div>
        <div class="value" id="livesVal">❤️❤️❤️</div>
      </div>
    </header>

    <div class="game-wrap">
      <canvas id="gameCanvas"></canvas>

      <div class="ui-layer">
        <div class="question-box">
          <div class="small">SOAL</div>
          <div class="big" id="questionText">17 + 20 = ?</div>
        </div>

        <div class="hud-top">
          <div class="hud-chip">
            <div class="chip-label">COMBO</div>
            <div class="chip-value" id="comboVal">x1</div>
            <div class="meter"><div class="meter-fill" id="comboFill"></div></div>
          </div>
          <div class="hud-chip">
            <div class="chip-label">WAKTU</div>
            <div class="chip-value" id="timerVal">12.0s</div>
          </div>
          <div class="hud-chip">
            <div class="chip-label">HI SCORE</div>
            <div class="chip-value" id="hiVal">0</div>
          </div>
        </div>

        <div class="reveal" id="revealBox">
          <div class="reveal-top">HASIL RING</div>
          <div class="reveal-answer" id="revealAnswer">37</div>
          <div class="reveal-status" id="revealStatus">Benar</div>
        </div>
      </div>

      <div class="screen" id="menuScreen">
        <div class="panel">
          <h2>BOLA PINTAR</h2>
          <p>Tembakkan bola ke ring dengan jawaban yang kamu pilih.</p>

          <div class="mode-grid">
            <button class="mode-btn active" data-mode="mix">Mode Campuran</button>
            <button class="mode-btn" data-mode="add">Penjumlahan</button>
            <button class="mode-btn" data-mode="sub">Pengurangan</button>
            <button class="mode-btn" data-mode="mul">Perkalian</button>
          </div>

          <button class="main-btn" id="startBtn">Main Sekarang</button>
          <button class="sub-btn" onclick="location.href='/#games'">Kembali ke Portal</button>
        </div>
      </div>

      <div class="screen hidden" id="overScreen">
        <div class="panel">
          <h2>Game Over</h2>
          <p>Skor akhir kamu:</p>
          <div class="score-final" id="finalScoreVal">0</div>

          <div class="badges">
            <div class="badge" id="bestComboBadge">Combo Tertinggi: x1</div>
            <div class="badge" id="swishBadge">Perfect Swish: 0</div>
          </div>

          <button class="main-btn" id="restartBtn">Main Lagi</button>
          <button class="sub-btn" id="menuBtn">Pilih Mode</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const scoreVal = document.getElementById('scoreVal');
    const livesVal = document.getElementById('livesVal');
    const comboVal = document.getElementById('comboVal');
    const comboFill = document.getElementById('comboFill');
    const timerVal = document.getElementById('timerVal');
    const hiVal = document.getElementById('hiVal');
    const questionText = document.getElementById('questionText');

    const revealBox = document.getElementById('revealBox');
    const revealAnswer = document.getElementById('revealAnswer');
    const revealStatus = document.getElementById('revealStatus');

    const menuScreen = document.getElementById('menuScreen');
    const overScreen = document.getElementById('overScreen');
    const finalScoreVal = document.getElementById('finalScoreVal');
    const bestComboBadge = document.getElementById('bestComboBadge');
    const swishBadge = document.getElementById('swishBadge');

    const modeButtons = document.querySelectorAll('.mode-btn');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const menuBtn = document.getElementById('menuBtn');

    let selectedMode = 'mix';
    let animationId = null;
    let gameRunning = false;
    let lastTime = 0;
    let revealTimeout = null;

    let score = 0;
    let lives = 3;
    let combo = 1;
    let comboChain = 0;
    let bestCombo = 1;
    let perfectSwish = 0;
    let shotClock = 12;
    let roundResolved = false;

    let currentProblem = null;
    let hoops = [];
    let particles = [];
    let popups = [];

    let pointerPressed = false;
    let aiming = false;
    let audioCtx = null;

    const world = {
      width: 0,
      height: 0,
      gravity: 0.22,
      floorY: 0
    };

    const launcher = {
      x: 0,
      y: 0,
      r: 18
    };

    const aim = {
      startX: 0,
      startY: 0,
      currentX: 0,
      currentY: 0,
      power: 0
    };

    const shot = {
      active: false,
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      r: 13,
      trail: [],
      scored: false
    };

    function ensureAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) {}
    }

    function beep(freq, duration = 0.08, type = 'sine', gainVal = 0.05) {
      try {
        ensureAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(gainVal, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function scoreSound(perfect = false) {
      beep(perfect ? 900 : 720, 0.08, 'triangle', 0.06);
      setTimeout(() => beep(perfect ? 1160 : 940, 0.1, 'triangle', 0.05), 70);
    }

    function missSound() {
      beep(180, 0.14, 'square', 0.06);
      setTimeout(() => beep(130, 0.18, 'sawtooth', 0.04), 60);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getHighScore() {
      try {
        const v = parseInt(localStorage.getItem('bolaPintarBlindHoopHigh') || '0', 10);
        return Number.isNaN(v) ? 0 : v;
      } catch (e) {
        return 0;
      }
    }

    function setHighScore(v) {
      try {
        localStorage.setItem('bolaPintarBlindHoopHigh', String(v));
      } catch (e) {}
    }

    function updateHUD() {
      scoreVal.textContent = score;
      livesVal.textContent = lives > 0 ? '❤️'.repeat(lives) : '💔';
      comboVal.textContent = 'x' + combo;
      comboFill.style.width = Math.min(100, comboChain * 20) + '%';
      timerVal.textContent = shotClock.toFixed(1) + 's';
      hiVal.textContent = getHighScore();
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      world.width = rect.width;
      world.height = rect.height;
      world.floorY = rect.height - 70;

      launcher.x = rect.width / 2;
      launcher.y = rect.height - 108;

      if (!shot.active) {
        shot.x = launcher.x;
        shot.y = launcher.y;
      }

      layoutHoops();
    }

    window.addEventListener('resize', resizeCanvas);

    function setMode(mode) {
      selectedMode = mode;
      modeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
    }

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => setMode(btn.dataset.mode));
    });

    function hideReveal() {
      revealBox.classList.remove('show');
    }

    function showReveal(answer, correct) {
      clearTimeout(revealTimeout);
      revealAnswer.textContent = answer;
      revealStatus.textContent = correct ? 'BENAR' : 'SALAH';
      revealStatus.style.color = correct ? '#86efac' : '#fca5a5';
      revealBox.classList.add('show');

      revealTimeout = setTimeout(() => {
        revealBox.classList.remove('show');
      }, 900);
    }

    function generateProblem() {
      let mode = selectedMode;
      if (mode === 'mix') {
        const list = ['add', 'sub', 'mul'];
        mode = list[randomInt(0, 2)];
      }

      let a, b, q, answer;

      if (mode === 'add') {
        a = randomInt(3, 20);
        b = randomInt(3, 20);
        q = `${a} + ${b}`;
        answer = a + b;
      } else if (mode === 'sub') {
        a = randomInt(12, 35);
        b = randomInt(2, a - 1);
        q = `${a} - ${b}`;
        answer = a - b;
      } else {
        a = randomInt(2, 10);
        b = randomInt(2, 10);
        q = `${a} × ${b}`;
        answer = a * b;
      }

      const options = [answer];
      while (options.length < 3) {
        const delta = randomInt(1, 8);
        let wrong = Math.random() > 0.5 ? answer + delta : answer - delta;
        if (wrong < 0) wrong = Math.abs(wrong) + 3;
        if (!options.includes(wrong)) options.push(wrong);
      }

      options.sort(() => Math.random() - 0.5);
      return { text: `${q} = ?`, answer, options };
    }

    function layoutHoops() {
      if (!currentProblem) return;

      const xs = [world.width * 0.2, world.width * 0.5, world.width * 0.8];
      const hoopY = clamp(world.height * 0.46, 250, 330);

      hoops = currentProblem.options.map((value, i) => ({
        id: i,
        x: xs[i],
        y: hoopY + (i === 1 ? -4 : 8),
        rimR: clamp(world.width * 0.08, 32, 40),
        value,
        isCorrect: value === currentProblem.answer,
        side: i === 0 ? 'left' : i === 1 ? 'center' : 'right',
        boardW: 16,
        boardH: 88,
        flash: null
      }));
    }

    function resetRoundState() {
      roundResolved = false;
      aiming = false;
      pointerPressed = false;
      shot.active = false;
      shot.scored = false;
      shot.trail = [];
      shot.x = launcher.x;
      shot.y = launcher.y;
      hideReveal();
    }

    function startGame() {
      ensureAudio();
      cancelAnimationFrame(animationId);
      clearTimeout(revealTimeout);

      score = 0;
      lives = 3;
      combo = 1;
      comboChain = 0;
      bestCombo = 1;
      perfectSwish = 0;
      particles = [];
      popups = [];
      shotClock = 12;
      currentProblem = generateProblem();
      questionText.textContent = currentProblem.text;

      resizeCanvas();
      resetRoundState();
      updateHUD();

      menuScreen.classList.add('hidden');
      overScreen.classList.add('hidden');

      gameRunning = true;
      lastTime = performance.now();
      animationId = requestAnimationFrame(loop);
    }

    function nextRound() {
      shotClock = clamp(12 - Math.floor(score / 120) * 0.5, 8, 12);
      currentProblem = generateProblem();
      questionText.textContent = currentProblem.text;
      layoutHoops();
      resetRoundState();
      updateHUD();
    }

    function gameOver() {
      gameRunning = false;
      cancelAnimationFrame(animationId);

      const hi = getHighScore();
      if (score > hi) setHighScore(score);

      finalScoreVal.textContent = score;
      bestComboBadge.textContent = 'Combo Tertinggi: x' + bestCombo;
      swishBadge.textContent = 'Perfect Swish: ' + perfectSwish;
      updateHUD();

      overScreen.classList.remove('hidden');
    }

    function addParticles(x, y, color, count = 18) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 4.8,
          vy: (Math.random() - 0.5) * 4.8,
          size: Math.random() * 4 + 2,
          life: 1,
          color
        });
      }
    }

    function addPopup(text, x, y, color = '#fff') {
      popups.push({
        text, x, y, color,
        life: 1,
        vy: -0.5
      });
    }

    function registerCorrect(hoop, perfect) {
      roundResolved = true;
      shot.active = false;
      hoop.flash = { color: '#22c55e', timer: 0.35 };

      let gain = 10 * combo;
      if (perfect) gain += 10;

      score += gain;
      comboChain++;
      combo = Math.min(5, 1 + Math.floor(comboChain / 2));
      bestCombo = Math.max(bestCombo, combo);
      if (perfect) perfectSwish++;

      addParticles(shot.x, shot.y, perfect ? '#fde047' : '#22c55e', perfect ? 24 : 18);
      addPopup(perfect ? `SWISH! +${gain}` : `+${gain}`, shot.x, shot.y - 16, perfect ? '#fde047' : '#bbf7d0');
      showReveal(hoop.value, true);
      scoreSound(perfect);
      updateHUD();

      setTimeout(() => {
        if (gameRunning) nextRound();
      }, 900);
    }

    function registerWrong(hoop = null, reason = 'MISS!') {
      roundResolved = true;
      shot.active = false;
      lives--;
      combo = 1;
      comboChain = 0;

      if (hoop) {
        hoop.flash = { color: '#ef4444', timer: 0.35 };
        showReveal(hoop.value, false);
      } else {
        hideReveal();
      }

      addParticles(shot.x, shot.y, '#ef4444', 16);
      addPopup(reason, shot.x, shot.y - 14, '#fecaca');
      missSound();
      updateHUD();

      if (lives <= 0) {
        setTimeout(gameOver, 620);
      } else {
        setTimeout(() => {
          if (gameRunning) nextRound();
        }, 900);
      }
    }

    function drawBasketball(x, y, r, rotation = 0) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = '#f97316';
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#3a1203';
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-r, 0);
      ctx.lineTo(r, 0);
      ctx.moveTo(0, -r);
      ctx.lineTo(0, r);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(-r * 0.55, 0, r * 0.72, -1.1, 1.1);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(r * 0.55, 0, r * 0.72, 2.04, 4.24);
      ctx.stroke();

      ctx.restore();
    }

    function drawCourt() {
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(world.width / 2, world.height + 40, 60 + i * 32, Math.PI, Math.PI * 2);
        ctx.lineWidth = i === 0 ? 3 : 1.2;
        ctx.strokeStyle = i === 0 ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.09)';
        ctx.stroke();
      }

      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(0, world.floorY, world.width, world.height - world.floorY);
      ctx.restore();
    }

    function drawHoop(hoop) {
      const x = hoop.x;
      const y = hoop.y;

      ctx.save();

      if (hoop.flash) {
        ctx.beginPath();
        ctx.arc(x, y + 10, hoop.rimR + 20, 0, Math.PI * 2);
        ctx.fillStyle = hoop.flash.color + '33';
        ctx.fill();
      }

      if (hoop.side === 'right') {
        ctx.fillStyle = 'rgba(0,0,0,0.16)';
        ctx.fillRect(x - hoop.rimR - 32, y - 44, hoop.boardW, hoop.boardH);

        ctx.fillStyle = '#f8fbff';
        ctx.strokeStyle = '#09121c';
        ctx.lineWidth = 3;
        ctx.beginPath();
        roundRectPath(ctx, x - hoop.rimR - 40, y - 48, 18, 90, 6);
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.fillStyle = 'rgba(0,0,0,0.16)';
        ctx.fillRect(x + hoop.rimR + 16, y - 44, hoop.boardW, hoop.boardH);

        ctx.fillStyle = '#f8fbff';
        ctx.strokeStyle = '#09121c';
        ctx.lineWidth = 3;
        ctx.beginPath();
        roundRectPath(ctx, x + hoop.rimR + 8, y - 48, 18, 90, 6);
        ctx.fill();
        ctx.stroke();
      }

      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(x - hoop.rimR, y);
      ctx.lineTo(x + hoop.rimR, y);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.74)';
      ctx.lineWidth = 2;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(x + i * 9, y + 1);
        ctx.lineTo(x + i * 6, y + 30);
        ctx.stroke();
      }

      /* Angka jawaban tampil netral, tanpa warna pembeda benar/salah */
      ctx.beginPath();
      roundRectPath(ctx, x - 44, y - 106, 88, 42, 16);
      ctx.fillStyle = '#f8fafc';
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#09121c';
      ctx.stroke();

      ctx.fillStyle = '#09121c';
      ctx.font = '800 18px "Plus Jakarta Sans"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(hoop.value), x, y - 85);

      ctx.restore();
    }

    function drawLauncher() {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(launcher.x, launcher.y + 18, 26, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      drawBasketball(launcher.x, launcher.y, launcher.r, 0);

      if (aiming) {
        const dx = aim.startX - aim.currentX;
        const dy = aim.startY - aim.currentY;
        const power = clamp(Math.hypot(dx, dy), 0, 130);

        ctx.strokeStyle = 'rgba(255,255,255,0.38)';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 8]);

        const previewVx = dx * 0.12;
        const previewVy = dy * 0.12;

        ctx.beginPath();
        for (let i = 0; i < 22; i++) {
          const t = i * 0.18;
          const px = launcher.x + previewVx * t * 8;
          const py = launcher.y + previewVy * t * 8 + (world.gravity * 42) * t * t;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath();
        ctx.roundRect?.(launcher.x - 58, launcher.y + 34, 116, 12, 999);
        if (!ctx.roundRect) roundRectPath(ctx, launcher.x - 58, launcher.y + 34, 116, 12, 999);
        ctx.fillStyle = 'rgba(9,18,28,0.18)';
        ctx.fill();

        ctx.beginPath();
        ctx.roundRect?.(launcher.x - 58, launcher.y + 34, power * 0.89, 12, 999);
        if (!ctx.roundRect) roundRectPath(ctx, launcher.x - 58, launcher.y + 34, power * 0.89, 12, 999);
        ctx.fillStyle = power > 94 ? '#ef4444' : power > 58 ? '#f59e0b' : '#22c55e';
        ctx.fill();
      }

      ctx.restore();
    }

    function drawShot() {
      if (!shot.active) return;

      for (let i = 0; i < shot.trail.length; i++) {
        const t = shot.trail[i];
        ctx.beginPath();
        ctx.arc(t.x, t.y, Math.max(2, shot.r * (i / shot.trail.length) * 0.55), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${i / shot.trail.length * 0.18})`;
        ctx.fill();
      }

      drawBasketball(shot.x, shot.y, shot.r, performance.now() * 0.01);
    }

    function drawParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.06;
        p.life -= dt * 0.0018;

        ctx.globalAlpha = Math.max(0, p.life);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.globalAlpha = 1;

        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawPopups(dt) {
      for (let i = popups.length - 1; i >= 0; i--) {
        const p = popups[i];
        p.y += p.vy;
        p.life -= dt * 0.0015;

        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.font = '800 20px "Plus Jakarta Sans"';
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
        ctx.globalAlpha = 1;

        if (p.life <= 0) popups.splice(i, 1);
      }
    }

    function updateShot(dt) {
      if (!shot.active) return;

      shot.vy += world.gravity * (dt / 16.67);
      shot.x += shot.vx * (dt / 16.67);
      shot.y += shot.vy * (dt / 16.67);

      shot.trail.push({ x: shot.x, y: shot.y });
      if (shot.trail.length > 14) shot.trail.shift();

      if (shot.x < shot.r) {
        shot.x = shot.r;
        shot.vx *= -0.72;
      }
      if (shot.x > world.width - shot.r) {
        shot.x = world.width - shot.r;
        shot.vx *= -0.72;
      }

      for (const hoop of hoops) {
        const leftRim = { x: hoop.x - hoop.rimR, y: hoop.y };
        const rightRim = { x: hoop.x + hoop.rimR, y: hoop.y };

        const dl = Math.hypot(shot.x - leftRim.x, shot.y - leftRim.y);
        const dr = Math.hypot(shot.x - rightRim.x, shot.y - rightRim.y);

        if (dl < shot.r + 6) {
          shot.vx = -Math.abs(shot.vx) * 0.88;
          shot.vy = -Math.abs(shot.vy) * 0.72;
        }
        if (dr < shot.r + 6) {
          shot.vx = Math.abs(shot.vx) * 0.88;
          shot.vy = -Math.abs(shot.vy) * 0.72;
        }

        const boardLeftX = hoop.side === 'right' ? hoop.x - hoop.rimR - 40 : hoop.x + hoop.rimR + 8;
        const boardRightX = boardLeftX + 18;
        const boardTopY = hoop.y - 48;
        const boardBottomY = hoop.y + 42;

        if (
          shot.x + shot.r > boardLeftX &&
          shot.x - shot.r < boardRightX &&
          shot.y + shot.r > boardTopY &&
          shot.y - shot.r < boardBottomY
        ) {
          if (shot.x < hoop.x) shot.x = boardLeftX - shot.r;
          else shot.x = boardRightX + shot.r;
          shot.vx *= -0.84;
        }

        const enteredFromTop =
          shot.vy > 0 &&
          shot.y > hoop.y + 6 &&
          shot.y < hoop.y + 32 &&
          shot.x > hoop.x - hoop.rimR + 4 &&
          shot.x < hoop.x + hoop.rimR - 4;

        if (!roundResolved && enteredFromTop) {
          const perfect = Math.abs(shot.x - hoop.x) < hoop.rimR * 0.28;
          if (hoop.isCorrect) registerCorrect(hoop, perfect);
          else registerWrong(hoop, 'SALAH!');
          return;
        }
      }

      if (!roundResolved && shot.y > world.floorY - shot.r) {
        registerWrong(null, 'MELESET!');
        return;
      }

      if (!roundResolved && (shot.y > world.height + 40 || shot.x < -40 || shot.x > world.width + 40)) {
        registerWrong(null, 'MISS!');
      }
    }

    function updateRoundClock(dt) {
      if (roundResolved) return;
      shotClock -= dt / 1000;
      if (shotClock <= 0) {
        shotClock = 0;
        registerWrong(null, 'WAKTU HABIS!');
      }
    }

    function updateFlashes(dt) {
      hoops.forEach(h => {
        if (h.flash) {
          h.flash.timer -= dt / 1000;
          if (h.flash.timer <= 0) h.flash = null;
        }
      });
    }

    function drawScene(dt) {
      ctx.clearRect(0, 0, world.width, world.height);
      drawCourt();
      hoops.forEach(drawHoop);
      drawLauncher();
      drawShot();
      drawParticles(dt);
      drawPopups(dt);
    }

    function loop(ts) {
      const dt = Math.min(32, ts - lastTime);
      lastTime = ts;

      if (gameRunning) {
        updateRoundClock(dt);
        updateShot(dt);
        updateFlashes(dt);
        drawScene(dt);
        updateHUD();
        animationId = requestAnimationFrame(loop);
      }
    }

    function pointerPos(evt) {
      const rect = canvas.getBoundingClientRect();
      const touch = evt.touches ? evt.touches[0] : evt;
      return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
      };
    }

    function canStartAim(pos) {
      return Math.hypot(pos.x - launcher.x, pos.y - launcher.y) <= 42 && !shot.active && !roundResolved;
    }

    function onPointerDown(evt) {
      if (!gameRunning) return;
      ensureAudio();

      const pos = pointerPos(evt);
      if (!canStartAim(pos)) return;

      evt.preventDefault();
      pointerPressed = true;
      aiming = true;
      aim.startX = launcher.x;
      aim.startY = launcher.y;
      aim.currentX = pos.x;
      aim.currentY = pos.y;
    }

    function onPointerMove(evt) {
      if (!pointerPressed || !aiming) return;
      const pos = pointerPos(evt);
      aim.currentX = pos.x;
      aim.currentY = pos.y;
    }

    function onPointerUp(evt) {
      if (!pointerPressed || !aiming) return;
      evt.preventDefault();

      pointerPressed = false;
      aiming = false;

      const dx = aim.startX - aim.currentX;
      const dy = aim.startY - aim.currentY;
      const power = clamp(Math.hypot(dx, dy), 12, 130);

      shot.active = true;
      shot.scored = false;
      shot.x = launcher.x;
      shot.y = launcher.y;
      shot.vx = dx * 0.115;
      shot.vy = dy * 0.115 - Math.min(2.5, power * 0.01);
      shot.trail = [];

      beep(420, 0.05, 'triangle', 0.04);
    }

    function roundRectPath(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    menuBtn.addEventListener('click', () => {
      overScreen.classList.add('hidden');
      menuScreen.classList.remove('hidden');
    });

    canvas.addEventListener('mousedown', onPointerDown);
    canvas.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);

    canvas.addEventListener('touchstart', onPointerDown, { passive: false });
    canvas.addEventListener('touchmove', onPointerMove, { passive: false });
    window.addEventListener('touchend', onPointerUp, { passive: false });

    resizeCanvas();
    updateHUD();
  </script>
</body>
</html>
